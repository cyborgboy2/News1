{% extends 'base.html' %}

{% block title %}
About
{% endblock %}

{% block body %}
<div class="containe mt-5">
    <h1>Додавання статьї</h1>
    <form action="/create-article" method="post">
        <input type="text" name="title" id="title" placeholder="Введіть заголовк статті"><br>
        <textarea  name="intro" id="intro" placeholder="Введіть вступний текст"></textarea><br>
        <textarea name="text" id="text" placeholder="Введіть текст статті"></textarea><br>
        <input type="submit" value="Send">
    </form>
</div>
{% endblock %}
