{% extends 'base.html' %}

{% block title %}
Articles
{% endblock %}

{% block body %}
<div class="containe mt-5">
    <h1>All articles</h1>

    {% if articles|length > 0 %}
        {% for el in articles %}
        <div class="card-clean">
            <h2>{{ el.title }}</h2>
            <p>{{ el.intro }}</p>
            <p>Date: {{ el.date.date() }}</p>
            <a href="/posts/{{ el.id }}">More</a>
        </div>
        {% endfor %}
    {% else %}
    <p>No articles yet...</p>
    {% endif %}
</div>
{% endblock %}
